    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Agentic automation treats work as coordinated steps—classify, extract, decide, escalate—often powered by AI with clear guardrails. Learn how to design repeatable patterns that stay observable, auditable, and safe to evolve."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
