    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Les arriérés ne se corrigent pas tout seuls : la conception de la saisie, les SLA et le routage déterminent si les dossiers atteignent les bons responsables. Un cadre pratique pour maîtriser les files sans perdre la traçabilité."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Arriérés et saisie des dossiers
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
      Hint: __Owner
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Une saisie saine commence par une seule porte d'entrée : métadonnées cohérentes, déduplication et règles de priorité claires. Sans cela, les équipes courent après les doublons pendant que le vrai travail vieillit dans des files invisibles.</p><p>Définissez des niveaux de service par type de dossier et par risque : tout document ne suit pas le même chemin. Associez automatisation et revue humaine aux frontières : les machines trient, les humains tranchent les exceptions.</p><p>Mesurez le temps par étape et le taux de retravail. Ce que vous ne mesurez pas restera défaillant. La transparence transforme l'arriéré en problème d'ingénierie que vous pouvez résoudre.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "62c99938-d40e-4878-ab77-3464abd79fd5"
      Hint: ShortDescription
      Value: Maîtrisez les arriérés de dossiers grâce à une saisie disciplinée, un routage et des métriques qui rendent les files visibles.
    - ID: "7a52d039-c368-46c1-b93d-5cbd5b802f73"
      Hint: metadataDescription
      Value: "Concevez la saisie, le routage et les SLA pour que les files de dossiers restent visibles et atteignent le bon propriétaire."
