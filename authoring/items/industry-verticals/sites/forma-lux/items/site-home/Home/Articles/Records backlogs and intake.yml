      Hint: ShortDescription
      Value: Domina atrasos de expedientes con ingesta disciplinada, enrutamiento y métricas que hacen visibles las colas.
    - ID: "7a52d039-c368-46c1-b93d-5cbd5b802f73"
      Hint: metadataDescription
      Value: "Diseña ingesta, enrutamiento y SLA para que las colas de registros sigan siendo visibles y lleguen al dueño correcto."
