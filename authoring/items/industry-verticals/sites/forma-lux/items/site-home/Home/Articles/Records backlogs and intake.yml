    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Los atrasos no se arreglan solos: el diseño de ingesta, los SLA y el enrutamiento deciden si los expedientes llegan a los responsables correctos. Un marco práctico para dominar colas sin perder trazabilidad."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Retrasos e ingesta de registros
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
      Hint: __Owner
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Una ingesta sana empieza por una sola puerta de entrada: metadatos coherentes, deduplicación y reglas de prioridad claras. Sin eso, los equipos persiguen duplicados mientras el trabajo real envejece en colas invisibles.</p><p>Define niveles de servicio por tipo de registro y riesgo: no todo documento necesita el mismo camino. Combina automatización con revisión humana en los bordes: las máquinas triagean, las personas deciden excepciones.</p><p>Mide tiempo por etapa y tasa de reproceso. Lo que no mides seguirá roto. La transparencia convierte el atraso en un problema de ingeniería que sí puedes resolver.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
