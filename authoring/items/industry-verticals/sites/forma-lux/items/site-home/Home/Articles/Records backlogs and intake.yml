    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Healthy intake starts with a single front door: consistent metadata, deduplication, and clear priority rules. Without that, teams chase duplicates while real work ages in invisible queues.</p><p>Define service levels by record type and risk—not every document needs the same path. Pair automation with human review at the edges: machines triage, people decide exceptions.</p><p>Measure time-in-stage and rework rates. What you do not measure will stay broken. Transparency turns backlog from shame into an engineering problem you can solve.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
