    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Una versión lista para IA no es una exportación puntual: es una tubería. Parte de líneas base claras: muestras doradas, campos esperados y bandas de confianza aceptables. Automatiza comprobaciones de regresión antes de producción.</p><p>Versiona modelos y prompts junto con el código de aplicación. Registra quién aprobó cada promoción, con qué datos se evaluó y cómo vigilará el desvío tras el despliegue.</p><p>Por último, combina lanzamientos con vías de reversión y colas con intervención humana para elementos de baja confianza. La fiabilidad supera a la novedad cuando los documentos afectan a ingresos o cumplimiento.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
