    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Shipping AI-assisted document changes requires the same discipline as software—versioning, validation, and controlled rollout. Learn how to structure AI-ready releases that protect quality and compliance."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
