  - ID: "b5e02ad9-d56f-4c41-a065-a133db87bdeb"
    Hint: __Display name
    Value: Métriques durables d'automatisation
  Versions:
  - Version: 1
    Fields:
    - ID: "001dd393-96c5-490b-924a-b0f25cd9efd8"
      Hint: __Lock
      Value: <r />
    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Les programmes d'automatisation stagnent lorsque le succès se mesure uniquement aux mises en production. Des métriques durables suivent les résultats d'affaires, la fiabilité et la charge des équipes—afin que la valeur se compose plutôt qu'elle ne s'érode."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T082739Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Métriques durables d'automatisation
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
      Hint: __Owner
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Associez l'efficacité à la qualité : le traitement de bout en bout ne veut rien dire si les exceptions gonflent discrètement ou si les clients désertent.</p><p>Surveillez la charge opérationnelle—billets pour mille transactions, délai moyen de rétablissement, heures de travail répétitif pour le support. Une bonne automatisation réduit le travail total, pas seulement le nombre de tâches.</p><p>Révisez les seuils chaque trimestre. Modèles, fournisseurs et processus dérivent ; votre tableau de bord devrait repérer la dérive avant que la direction ne l'apprenne par des escalades.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "62c99938-d40e-4878-ab77-3464abd79fd5"
      Hint: ShortDescription
      Value: "Mesurez les programmes d'automatisation par les résultats, la fiabilité et la charge opérationnelle—pas par l'effet d'annonce."
    - ID: "7a52d039-c368-46c1-b93d-5cbd5b802f73"
      Hint: metadataDescription
      Value: "Définissez des métriques durables d'automatisation sur la qualité, le débit et la réduction du travail répétitif."
    - ID: "8cdc337e-a112-42fb-bbb4-4143751e123f"
      Hint: __Revision
      Value: "072c7bf2-8dd9-4f54-a842-3ac55d1c1579"
