    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Pair efficiency metrics with quality: straight-through processing is meaningless if exceptions quietly balloon or customers churn.</p><p>Watch operational load—tickets per thousand transactions, mean time to recover, toil hours for support teams. Great automation reduces total work, not just task count.</p><p>Revisit thresholds quarterly. Models, vendors, and processes drift; your scorecard should catch drift before executives read about it in escalations.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
