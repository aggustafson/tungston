    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Automation programs stall when success is measured only by go-lives. Sustainable metrics track business outcomes, reliability, and team load—so value compounds instead of eroding."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T082739Z
