  - ID: "b5e02ad9-d56f-4c41-a065-a133db87bdeb"
    Hint: __Display name
    Value: Métricas sostenibles de automatización
  Versions:
  - Version: 1
    Fields:
    - ID: "001dd393-96c5-490b-924a-b0f25cd9efd8"
      Hint: __Lock
      Value: <r />
    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Los programas de automatización se estancan cuando el éxito se mide solo por puestas en marcha. Las métricas sostenibles siguen resultados de negocio, fiabilidad y carga del equipo—para que el valor se acumule en lugar de erosionarse."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T082739Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Métricas sostenibles de automatización
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
      Hint: __Owner
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Combina métricas de eficiencia con calidad: el procesamiento directo no sirve de nada si las excepciones crecen en silencio o se van clientes.</p><p>Observa la carga operativa—tickets por mil transacciones, tiempo medio de recuperación, horas de trabajo manual de soporte. La buena automatización reduce el trabajo total, no solo el recuento de tareas.</p><p>Revisa umbrales cada trimestre. Modelos, proveedores y procesos derivan; tu cuadro de mando debe detectar la deriva antes de que los ejecutivos la lean en escalaciones.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "62c99938-d40e-4878-ab77-3464abd79fd5"
      Hint: ShortDescription
      Value: "Mide programas de automatización por resultados, fiabilidad y carga operativa—no por modas."
    - ID: "7a52d039-c368-46c1-b93d-5cbd5b802f73"
      Hint: metadataDescription
      Value: "Define métricas sostenibles de automatización en calidad, rendimiento y reducción de trabajo manual."
