    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Accounts payable and receivable are where automation earns trust—or loses it. Strong programs combine machine extraction, policy-based matching, and tight feedback loops for exceptions before cash hits the bank."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
