    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Les comptes fournisseurs et clients sont le lieu où l'automatisation gagne la confiance ou la perd. Les programmes solides combinent extraction machine, rapprochement piloté par les politiques et boucles de rétroaction serrées pour les exceptions avant que les liquidités n'atteignent la banque."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Automatisation des comptes fournisseurs et clients
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
      Hint: __Owner
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Pour les comptes fournisseurs, automatisez d'abord la saisie et la validation : en-tête, lignes, taxes et références de bon de commande doivent entrer dans le flux avec des scores de confiance. Les règles de rapprochement à deux ou trois voies détectent tôt les écarts ; seules les véritables exceptions devraient atteindre la comptabilité.</p><p>Pour les comptes clients, associez l'ingestion des avis de versement à une application intelligente des paiements. Lorsque les règlements se répartissent sur plusieurs factures ou arrivent sans référence, modèles et règles métier battent les feuilles de calcul—et rassurent davantage les auditeurs.</p><p>Instrumentez tout : taux de passage direct, délai de cycle, ancienneté des exceptions et retravail par fournisseur ou segment client. L'automatisation financière est un produit : livrez de petites améliorations chaque semaine et retirez les macros fragiles avant qu'elles ne dictent votre clôture.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
