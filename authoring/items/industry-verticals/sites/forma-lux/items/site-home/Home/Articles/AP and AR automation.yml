    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Las cuentas por pagar y por cobrar son donde la automatización gana confianza o la pierde. Los programas sólidos combinan extracción automática, conciliación basada en políticas y circuitos de feedback ajustados para excepciones antes de que el efectivo llegue al banco."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Automatización de AP y AR
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
      Hint: __Owner
      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>En AP, automatiza primero la captura y validación: cabecera, líneas, impuestos y referencias de pedido deben entrar en flujo con puntuaciones de confianza. Las reglas de emparejamiento en dos y tres vías detectan varianzas pronto; solo las excepciones reales deberían llegar a contabilidad.</p><p>En AR, empareja la ingesta de avisos de remesa con aplicación inteligente de efectivo. Cuando los pagos se reparten entre facturas o llegan sin referencias, modelos más reglas de negocio vencen a las hojas de cálculo—y dejan más contentos a los auditores.</p><p>Instrumenta todo: tasa de paso directo, tiempo de ciclo, antigüedad de excepciones y reproceso por proveedor o segmento de cliente. La automatización financiera es un producto: entrega mejoras pequeñas cada semana y retira macros frágiles antes de que manden en tu cierre.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
      Hint: __Created by
