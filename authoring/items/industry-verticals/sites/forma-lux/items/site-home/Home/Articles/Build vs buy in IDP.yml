      Value: |
        sitecore\movin.tilakaratne@sitecore.com
    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Start with a decision memo: what must be unique to your business versus what is undifferentiated plumbing. Packaged IDP accelerates capture, classification, and integrations; custom build buys control at the cost of velocity and long-run maintenance.</p><p>Favor buy when you need certified connectors, predictable upgrades, and shared roadmap pressure on vendors. Favor build—or heavy extend—when regulations, bespoke ERP entanglement, or air-gapped deployment are table stakes.</p><p>Model TCO over five years: licenses, services, testing each release, on-call rotations, and opportunity cost of engineering diverted from customer features. The right answer is rarely pure; hybrid patterns (vendor core + custom services) win when boundaries are explicit.</p></div>
    - ID: "5dd74568-4d4b-44c1-b513-0af5f4cda34f"
