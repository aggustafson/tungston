    - ID: "17b75967-9b67-4eb9-bb35-bbe0228ca368"
      Hint: pageSummary
      Value: "Buy an intelligent document platform when time-to-value and maintained connectors matter; build when proprietary workflows, data residency, or legacy depth are non-negotiable. Here is how to compare total cost of ownership without betting the program on a slide deck."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
      Hint: NavigationTitle
      Value: Build vs buy in IDP
    - ID: "52807595-0f8f-4b20-8d2a-cb71d28c6103"
