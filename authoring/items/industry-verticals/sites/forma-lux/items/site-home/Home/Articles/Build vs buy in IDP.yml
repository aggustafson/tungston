      Hint: pageSummary
      Value: "Compra una plataforma documental inteligente cuando importe el tiempo hasta el valor y los conectores mantenidos; construye cuando los flujos propietarios, la residencia de datos o la profundidad legacy no sean negociables. Así se compara el coste total de propiedad sin apostar el programa a una presentación."
    - ID: "25bed78c-4957-4165-998a-ca1b52f67497"
      Hint: __Created
      Value: 20251128T084006Z
    - ID: "4e0720e9-9d50-4ddc-87cf-ecd65e8e94c8"
